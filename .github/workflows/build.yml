name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm next build

      - name: Build Electron app
        run: pnpm exec electron-builder --win --config electron-builder.json
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetTopoHistory-Windows-Setup
          path: release/*.exe
          retention-days: 30
